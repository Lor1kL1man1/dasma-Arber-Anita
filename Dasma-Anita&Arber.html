<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ftesë Dasme Klasike</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --ivory:   #FFFFFF;
  --cream:   #FAF8F5;
  --parchment: #F3EDE3;
  --gold:    #C9A84C;
  --gold-light: #DFC07A;
  --gold-dark: #9A7428;
  --navy:    #F7F4EF;
  --navy-deep: #FFFFFF;
  --navy-mid: #7A6040;
  --ink:     #2C1A08;
  --sage:    #5A6B4F;
}

html, body {
  width:100%; height:100%;
  background: #FFFFFF;
  font-family: 'Cormorant Garamond', Georgia, serif;
  overflow: hidden;
}

body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(201,168,76,0.07) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 90%, rgba(201,168,76,0.05) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 50%, rgba(245,240,230,0.4) 0%, transparent 70%);
  pointer-events:none; z-index:0;
}

/* ── PARTICLES ── */
.particles { position:fixed; inset:0; pointer-events:none; z-index:1; overflow:hidden; }
.p {
  position:absolute; bottom:-20px;
  animation:rise linear infinite;
  opacity:0;
}
@keyframes rise {
  0%   { transform:translateY(0) rotate(0deg);    opacity:0; }
  8%   { opacity:0.6; }
  90%  { opacity:0.2; }
  100% { transform:translateY(-110vh) rotate(720deg); opacity:0; }
}

/* ══════════════════════════════
   ENVELOPE SCREEN
══════════════════════════════ */
#envelopeScreen {
  position:fixed; inset:0; z-index:10;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px;
  gap:24px;
  transition:opacity 0.6s ease, transform 0.6s ease;
}
#envelopeScreen.hiding {
  opacity:0;
  transform:scale(0.92) translateY(24px);
  pointer-events:none;
}

.env-monogram {
  text-align:center;
  color: var(--gold-dark);
  font-family:'Playfair Display', serif;
  font-style:italic;
  font-size:clamp(1.1rem, 3.5vw, 1.4rem);
  letter-spacing:0.28em;
  opacity:1;
  text-shadow: 0 1px 8px rgba(201,168,76,0.18);
}

.env-subtitle {
  text-align:center;
  color: rgba(154,116,40,0.75);
  font-family:'Cormorant Garamond', serif;
  font-style:italic;
  font-size:clamp(0.8rem, 2.2vw, 0.9rem);
  letter-spacing:0.32em;
  text-transform:uppercase;
  margin-top:-16px;
}

.envelope {
  width:100%;
  max-width:min(420px, 92vw);
  cursor:pointer;
  position:relative;
  filter:drop-shadow(0 24px 48px rgba(0,0,0,0.7)) drop-shadow(0 4px 12px rgba(184,150,46,0.15));
  -webkit-user-select:none; user-select:none;
  touch-action:manipulation;
  transition:transform 0.3s ease;
}
.envelope:hover { transform: translateY(-4px); }
.envelope svg { width:100%; height:auto; display:block; }

.seal-overlay {
  position:absolute;
  left:50%; top:54%;
  transform:translate(-50%,-50%);
  width:90px; height:90px;
  border-radius:50%;
  cursor:pointer;
}

.tap-hint {
  color: var(--gold-dark);
  font-family:'Playfair Display', serif;
  font-style:italic;
  font-size:clamp(1rem, 3vw, 1.1rem);
  letter-spacing:0.22em;
  opacity:1;
  animation:pulse 2.8s ease-in-out infinite;
  text-align:center;
  text-shadow: 0 1px 6px rgba(201,168,76,0.2);
}
@keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:0.85} }

/* ══════════════════════════════
   INVITATION SCREEN
══════════════════════════════ */
#invitationScreen {
  position:fixed; inset:0; z-index:50;
  background: var(--navy-deep);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.8s ease 0.2s;
  padding:0 0 env(safe-area-inset-bottom, 40px);
}
#invitationScreen.visible {
  opacity:1;
  pointer-events:all;
}

.inv-inner {
  width:100%;
  max-width:520px;
  display:flex;
  flex-direction:column;
  align-items:stretch;
  transform:translateY(60px);
  opacity:0;
  transition:transform 1.1s cubic-bezier(0.16,1,0.3,1) 0.5s,
             opacity 1s ease 0.5s;
}
#invitationScreen.visible .inv-inner {
  transform:translateY(0);
  opacity:1;
}

/* ── Header band ── */
.header-band {
  width:100%;
  background: linear-gradient(135deg, var(--cream) 0%, var(--ivory) 100%);
  padding:32px 20px 28px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  border-bottom:2px solid var(--gold);
  position:relative;
  overflow:hidden;
}
.header-band::before {
  content:'';
  position:absolute; inset:0;
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 18px,
    rgba(184,150,46,0.04) 18px,
    rgba(184,150,46,0.04) 20px
  );
}
.hb-rule {
  width:60px; height:1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin:4px 0;
}
.hb-title {
  font-family:'Playfair Display', serif;
  font-style:italic;
  color: var(--gold-dark);
  font-size:clamp(1.6rem,5vw,2.1rem);
  letter-spacing:0.1em;
  text-align:center;
  position:relative; z-index:1;
  text-shadow: 0 1px 8px rgba(201,168,76,0.15);
}
.hb-sub {
  color:rgba(154,116,40,0.85);
  font-family:'Cormorant Garamond', serif;
  font-style:italic;
  font-size:clamp(0.75rem,2vw,0.85rem);
  letter-spacing:0.3em;
  text-transform:uppercase;
  position:relative; z-index:1;
}

/* ── Invitation card ── */
.card {
  width:100%;
  background: var(--ivory);
  border-left:3px solid var(--gold);
  border-right:3px solid var(--gold);
  position:relative;
  overflow:hidden;
}
.card::before {
  content:'';
  position:absolute; inset:10px;
  border:1px solid rgba(184,150,46,0.25);
  pointer-events:none; z-index:1;
}

/* Corner flourishes */
.card-corners {
  position:absolute; inset:0; pointer-events:none; z-index:2;
}

/* Sample placeholder — swap with your img tag */
.inv-placeholder {
  width:100%;
  background: var(--ivory);
  min-height:420px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:50px 30px;
  position:relative;
}

.pl-ornament {
  color:var(--gold);
  font-size:2.5rem;
  line-height:1;
  opacity:0.5;
}
.pl-title {
  font-family:'Playfair Display',serif;
  font-style:italic;
  color:var(--navy);
  font-size:clamp(1.6rem,5vw,2.2rem);
  text-align:center;
}
.pl-rule {
  width:100px; height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:4px 0;
}
.pl-date {
  font-family:'Cormorant Garamond',serif;
  color:var(--navy-mid);
  font-size:clamp(1rem,3vw,1.2rem);
  letter-spacing:0.15em;
  text-align:center;
}
.pl-small {
  color:rgba(28,43,74,0.55);
  font-size:clamp(0.75rem,2.2vw,0.85rem);
  letter-spacing:0.2em;
  text-transform:uppercase;
  text-align:center;
}
.pl-note {
  margin-top:10px;
  color:rgba(184,150,46,0.6);
  font-style:italic;
  font-size:0.78rem;
  text-align:center;
  border:1px dashed rgba(184,150,46,0.3);
  padding:10px 20px;
  border-radius:2px;
  max-width:260px;
}

/* Real invitation image (uncomment and use) */
.inv-img {
  width:100%;
  height:auto;
  display:block;
}

/* ── Footer band ── */
.footer-band {
  width:100%;
  background: linear-gradient(135deg, var(--ivory) 0%, var(--cream) 100%);
  border-top:2px solid var(--gold);
  border-bottom:none;
  padding:16px 20px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
}

.wa-label {
  font-family:'Playfair Display',serif;
  font-style:italic;
  color:var(--gold-dark);
  font-size:clamp(1rem,3vw,1.15rem);
  text-align:center;
  letter-spacing:0.1em;
  opacity:1;
}

.wa-btn {
  display:inline-flex;
  align-items:center;
  gap:14px;
  background:linear-gradient(135deg, #1a5c50 0%, #128C7E 50%, #0d7a6d 100%);
  color:#fff;
  text-decoration:none;
  padding:16px 32px;
  border-radius:3px;
  font-family:'Cormorant Garamond',serif;
  font-weight:600;
  box-shadow:
    0 6px 28px rgba(18,140,126,0.3),
    0 0 0 1px rgba(184,150,46,0.6),
    inset 0 1px 0 rgba(255,255,255,0.1);
  transition:transform 0.18s, box-shadow 0.18s;
  touch-action:manipulation;
  max-width:320px;
  width:100%;
  justify-content:center;
  position:relative;
  overflow:hidden;
}
.wa-btn::before {
  content:'';
  position:absolute; inset:1px;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:2px;
  pointer-events:none;
}
.wa-btn:active { transform:scale(0.97); }
.wa-btn svg { width:24px; height:24px; fill:#fff; flex-shrink:0; }
.wa-text { display:flex; flex-direction:column; line-height:1.3; }
.wa-text span:first-child { font-size:clamp(1rem,3vw,1.1rem); }
.wa-text span:last-child  { font-size:clamp(0.7rem,2vw,0.78rem); opacity:0.75; letter-spacing:0.12em; text-transform:uppercase; }

.divider {
  display:flex; align-items:center; gap:12px; width:100%;
}
.div-line { flex:1; height:1px; }
.div-line:first-child { background:linear-gradient(90deg,transparent,rgba(184,150,46,0.4)); }
.div-line:last-child  { background:linear-gradient(270deg,transparent,rgba(184,150,46,0.4)); }
.div-gem { color:rgba(184,150,46,0.55); font-size:0.6rem; white-space:nowrap; letter-spacing:0.15em; }

.family-sig {
  font-family:'Playfair Display',serif;
  font-style:italic;
  color:rgba(139,105,20,0.75);
  font-size:clamp(0.85rem,2.5vw,0.95rem);
  letter-spacing:0.15em;
  text-align:center;
}

/* ── Animations ── */
.footer-band {
  opacity:0;
  transform:translateY(20px);
  transition:opacity 0.7s ease 1.4s, transform 0.7s ease 1.4s;
}
#invitationScreen.visible .footer-band {
  opacity:1;
  transform:translateY(0);
}
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<!-- ══ ENVELOPE ══ -->
<div id="envelopeScreen">

  <p class="env-monogram">✦ &nbsp; Jeni të Ftuar me Ngrohtësi &nbsp; ✦</p>
  <p class="env-subtitle">Një festim ju pret brenda</p>

  <div class="envelope" id="envelopeEl" onclick="openEnvelope()">
    <svg viewBox="0 0 440 285" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Envelope body gradient: warm white -->
        <linearGradient id="envBody" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#FFFFFF"/>
          <stop offset="45%"  stop-color="#FAF7F2"/>
          <stop offset="100%" stop-color="#F3EDE3"/>
        </linearGradient>
        <!-- Flap gradient: soft warm white -->
        <linearGradient id="envFlap" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stop-color="#EDE5D5"/>
          <stop offset="100%" stop-color="#FAF7F2"/>
        </linearGradient>
        <!-- Gold shimmer on parchment lining -->
        <linearGradient id="lining" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#EFE8D5"/>
          <stop offset="50%"  stop-color="#F8F3E8"/>
          <stop offset="100%" stop-color="#E4D8BB"/>
        </linearGradient>
        <!-- Drop shadow -->
        <filter id="envShadow">
          <feDropShadow dx="0" dy="12" stdDeviation="22" flood-color="rgba(180,140,60,0.22)"/>
          <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="rgba(201,168,76,0.15)"/>
        </filter>
        <!-- Hatching pattern -->
        <pattern id="hatch" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="12" stroke="rgba(201,168,76,0.08)" stroke-width="1"/>
        </pattern>
      </defs>

      <!-- Envelope body -->
      <rect x="0" y="0" width="440" height="285" rx="4" fill="url(#envBody)" filter="url(#envShadow)"/>
      <rect x="0" y="0" width="440" height="285" rx="4" fill="url(#hatch)"/>

      <!-- Inner parchment peek (bottom fold) -->
      <polygon points="0,285 220,162 440,285" fill="url(#lining)" opacity="0.6"/>

      <!-- Outer gold border -->
      <rect x="1"  y="1"  width="438" height="283" rx="3.5" fill="none" stroke="#B8962E" stroke-width="1.8"/>
      <!-- Inner fine border -->
      <rect x="9"  y="9"  width="422" height="267" rx="2"   fill="none" stroke="rgba(184,150,46,0.35)" stroke-width="0.8"/>
      <rect x="14" y="14" width="412" height="257" rx="1.5" fill="none" stroke="rgba(184,150,46,0.15)" stroke-width="0.5"/>

      <!-- Fold lines (bottom, left, right) -->
      <polygon points="0,285 220,162 440,285" fill="rgba(201,168,76,0.09)"/>
      <polyline points="2,285 220,163 438,285" fill="none" stroke="rgba(201,168,76,0.45)" stroke-width="1.2"/>
      <polygon points="0,0 220,162 0,285" fill="rgba(201,168,76,0.06)"/>
      <polyline points="2,2 221,161 2,283" fill="none" stroke="rgba(201,168,76,0.3)" stroke-width="0.7"/>
      <polygon points="440,0 220,162 440,285" fill="rgba(201,168,76,0.06)"/>
      <polyline points="438,2 219,161 438,283" fill="none" stroke="rgba(201,168,76,0.3)" stroke-width="0.7"/>

      <!-- Top corner flourishes -->
      <g stroke="#B8962E" stroke-width="0.9" fill="none" opacity="0.5">
        <path d="M22,22 L50,22 M22,22 L22,50"/>
        <path d="M418,22 L390,22 M418,22 L418,50"/>
        <path d="M22,263 L50,263 M22,263 L22,235"/>
        <path d="M418,263 L390,263 M418,263 L418,235"/>
        <circle cx="22" cy="22" r="3" fill="#B8962E" opacity="0.6"/>
        <circle cx="418" cy="22" r="3" fill="#B8962E" opacity="0.6"/>
        <circle cx="22" cy="263" r="3" fill="#B8962E" opacity="0.6"/>
        <circle cx="418" cy="263" r="3" fill="#B8962E" opacity="0.6"/>
      </g>

      <!-- Diamond row — top -->
      <g fill="#B8962E" opacity="0.55">
        <polygon points="55,20 58,28 55,36 52,28"/>
        <polygon points="90,20 93,28 90,36 87,28"/>
        <polygon points="125,20 128,28 125,36 122,28"/>
        <polygon points="160,20 163,28 160,36 157,28"/>
        <polygon points="195,20 199,28 195,36 191,28"/>
        <polygon points="220,17 225,26 220,35 215,26"/>
        <polygon points="245,20 249,28 245,36 241,28"/>
        <polygon points="280,20 283,28 280,36 277,28"/>
        <polygon points="315,20 318,28 315,36 312,28"/>
        <polygon points="350,20 353,28 350,36 347,28"/>
        <polygon points="385,20 388,28 385,36 382,28"/>
      </g>
      <!-- Diamond row — bottom -->
      <g fill="#B8962E" opacity="0.55">
        <polygon points="55,249 58,257 55,265 52,257"/>
        <polygon points="90,249 93,257 90,265 87,257"/>
        <polygon points="125,249 128,257 125,265 122,257"/>
        <polygon points="160,249 163,257 160,265 157,257"/>
        <polygon points="220,249 224,258 220,267 216,258"/>
        <polygon points="280,249 283,257 280,265 277,257"/>
        <polygon points="315,249 318,257 315,265 312,257"/>
        <polygon points="350,249 353,257 350,265 347,257"/>
        <polygon points="385,249 388,257 385,265 382,257"/>
      </g>

      <!-- FLAP -->
      <g id="flapGroup" style="transform-origin:220px 0px; transition:transform 0.95s cubic-bezier(0.4,0,0.2,1);">
        <polygon points="0,0 440,0 220,178" fill="url(#envFlap)"/>
        <polygon points="0,0 440,0 220,178" fill="url(#hatch)" opacity="0.8"/>
        <polyline points="2,2 438,2 220,176" fill="none" stroke="#B8962E" stroke-width="1.8"/>

        <!-- Flap inner fine line -->
        <polyline points="10,10 430,10 221,170" fill="none" stroke="rgba(184,150,46,0.25)" stroke-width="0.6"/>

        <!-- Flap diamonds -->
        <g fill="#B8962E" opacity="0.5">
          <polygon points="150,24 154,32 150,40 146,32"/>
          <polygon points="185,24 189,32 185,40 181,32"/>
          <polygon points="220,38 225,48 220,58 215,48"/>
          <polygon points="255,24 259,32 255,40 251,32"/>
          <polygon points="290,24 294,32 290,40 286,32"/>
        </g>

        <!-- Flap corner flourishes -->
        <g stroke="rgba(184,150,46,0.4)" stroke-width="0.7" fill="none">
          <path d="M28,12 L60,12 M28,12 L28,30"/>
          <path d="M412,12 L380,12 M412,12 L412,30"/>
        </g>
      </g>

      <!-- WAX SEAL -->
      <g transform="translate(220,165)" id="sealGroup">
        <!-- Outer glow -->
        <circle cx="0" cy="0" r="46" fill="rgba(160,30,40,0.15)"/>
        <!-- Wax body -->
        <circle cx="0" cy="0" r="40" fill="#7a1020"/>
        <circle cx="0" cy="0" r="38" fill="#8c1525"/>
        <circle cx="0" cy="0" r="36" fill="#9e1a2a"/>
        <!-- Wax texture rings -->
        <circle cx="0" cy="0" r="40" fill="none" stroke="#B8962E" stroke-width="2"/>
        <circle cx="0" cy="0" r="32" fill="none" stroke="rgba(184,150,46,0.5)" stroke-width="0.7" stroke-dasharray="4,4"/>
        <circle cx="0" cy="0" r="24" fill="none" stroke="rgba(184,150,46,0.3)" stroke-width="0.5"/>

        <!-- Classic monogram: ornate "A" or floral motif -->
        <g fill="#B8962E" opacity="0.9">
          <!-- Stylized botanical: stem, leaves -->
          <!-- Central stem -->
          <rect x="-1" y="-22" width="2" height="30" rx="1"/>
          <!-- Left leaf -->
          <path d="M-1,-8 C-12,-12 -16,-4 -8,2 C-4,4 -1,0 -1,-4 Z"/>
          <!-- Right leaf -->
          <path d="M1,-8 C12,-12 16,-4 8,2 C4,4 1,0 1,-4 Z"/>
          <!-- Small top bud -->
          <ellipse cx="0" cy="-24" rx="3.5" ry="5"/>
          <ellipse cx="0" cy="-24" rx="1.5" ry="3" fill="#1d2d1d"/>
          <!-- Base flourish -->
          <path d="M-10,8 C-6,10 -2,12 0,12 C2,12 6,10 10,8" stroke="#B8962E" stroke-width="1.2" fill="none"/>
          <!-- Small side buds -->
          <ellipse cx="-9" cy="0" rx="2.5" ry="3.5" transform="rotate(-35,-9,0)"/>
          <ellipse cx="9"  cy="0" rx="2.5" ry="3.5" transform="rotate(35,9,0)"/>
          <!-- Dots -->
          <circle cx="-13" cy="-6" r="1.2"/>
          <circle cx="13"  cy="-6" r="1.2"/>
          <circle cx="0"   cy="14" r="1.5"/>
        </g>
      </g>
    </svg>
    <div class="seal-overlay" onclick="openEnvelope()"></div>
  </div>

  <p class="tap-hint" id="tapHint">— &nbsp; prekni për të hapur &nbsp; —</p>
</div>

<!-- ══ INVITATION SCREEN ══ -->
<div id="invitationScreen">
  <div class="inv-inner" id="invInner">


    <!-- INVITATION CARD / IMAGE -->
    <div class="card">
      <svg class="card-corners" viewBox="0 0 100 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <g stroke="#B8962E" stroke-width="0.5" fill="none" opacity="0.35">
          <path d="M2,2 L14,2 M2,2 L2,14"/>
          <path d="M98,2 L86,2 M98,2 L98,14"/>
          <!-- <path d="M2,98 L14,98 M2,98 L2,86"/> -->
          <!-- <path d="M98,98 L86,98 M98,98 L98,86"/> -->
        </g>
      </svg>

      <!-- ══ SWAP THIS BLOCK with your <img> tag ══ -->
<img src="Dasma-Anita&Arber.png" alt="Dasma-Anita&Arber.png" class="inv-img">
      <!-- ══ END SWAP BLOCK ══ -->
    </div>

    <!-- FOOTER BAND + WHATSAPP -->
    <div class="footer-band">

      <div class="divider">
        <div class="div-line"></div>
        <span class="div-gem">✦ &nbsp; ◆ &nbsp; ✦</span>
        <div class="div-line"></div>
      </div>

<script>
let opened = false;

/* ── Ambient particles ── */
const syms = ['✦','◆','❖','·','⬧'];
const pc = document.getElementById('particles');

function spawnP(burst) {
  const el = document.createElement('span');
  el.className = 'p';
  el.textContent = syms[Math.floor(Math.random() * syms.length)];
  el.style.left = (Math.random() * 100) + 'vw';

  if (burst) {
    el.style.color = Math.random() > 0.6 ? '#D4AF5A' : 'rgba(184,150,46,0.7)';
  } else {
    const a = (0.15 + Math.random() * 0.2).toFixed(2);
    el.style.color = `rgba(184,150,46,${a})`;
  }

  const d = burst ? (2.5 + Math.random() * 3) : (9 + Math.random() * 9);
  el.style.animationDuration = d + 's';
  el.style.animationDelay = (burst ? Math.random() * 0.7 : 0) + 's';
  el.style.fontSize = (burst ? 0.7 + Math.random() * 1.2 : 0.35 + Math.random() * 0.45) + 'rem';
  pc.appendChild(el);
  setTimeout(() => el.remove(), (d + 2) * 1000);
}

setInterval(() => spawnP(false), 2800);

/* ── Open envelope ── */
function openEnvelope() {
  if (opened) return;
  opened = true;

  // Flip flap open
  const flap = document.getElementById('flapGroup');
  flap.style.transform = 'rotateX(-185deg)';

  document.getElementById('tapHint').style.opacity = '0';

  // Burst particles
  for (let i = 0; i < 28; i++) spawnP(true);

  setTimeout(() => {
    document.getElementById('envelopeScreen').classList.add('hiding');
    setTimeout(() => {
      document.getElementById('envelopeScreen').style.display = 'none';
      document.body.style.overflow = 'auto';
      document.documentElement.style.overflow = 'auto';
      document.getElementById('invitationScreen').classList.add('visible');
    }, 500);
  }, 950);
}
</script>
